<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Auto Style System</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

header{
background:#000;
color:white;
padding:20px;
font-size:28px;
}

input{
padding:10px;
width:250px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
font-size:16px;
background:#ff9800;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e68900;
}

#gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.card{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:200px;
}

.card img{
width:100%;
border-radius:10px;
}

.nameStyle{
margin-top:5px;
font-weight:bold;
color:#333;
}
</style>
</head>

<body>

<header>GM Auto Style System</header>

<br>

<input type="text" id="username" placeholder="Enter Your Name">
<button onclick="generateDesign()">Generate Design</button>

<div id="gallery"></div>

<script>

function generateDesign(){

let name=document.getElementById("username").value;

if(name==""){
alert("Please enter name");
return;
}

let gallery=document.getElementById("gallery");
gallery.innerHTML="";

let styles=[
"https://source.unsplash.com/200x200/?gold,ring",
"https://source.unsplash.com/200x200/?jewellery,locket",
"https://source.unsplash.com/200x200/?diamond,ring",
"https://source.unsplash.com/200x200/?necklace,gold",
"https://source.unsplash.com/200x200/?jewelry,pendant",
"https://source.unsplash.com/200x200/?luxury,ring",
"https://source.unsplash.com/200x200/?gold,necklace",
"https://source.unsplash.com/200x200/?diamond,jewelry"
];

for(let i=0;i<styles.length;i++){

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${styles[i]}" alt="design">
<div class="nameStyle">${name} Style ${i+1}</div>
`;

gallery.appendChild(card);

}

}

</script>

</body>
</html>
